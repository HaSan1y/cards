<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login/Register Page</title>
		<link rel="stylesheet" href="s.css" />
	</head>
	<body>
		<div class="container">
			<div class="card">
				<div class="card-header">
					<h2 id="formTitle">Login</h2>
					<p id="formDescription">Welcome back! Please login to your account.</p>
				</div>
				<div class="card-content">
					<form id="authForm">
						<div class="form-group">
							<label for="username">Username</label>
							<input type="text" id="username" name="username" required />
						</div>
						<div class="form-group" id="emailGroup" style="display: none">
							<label for="email">Email</label>
							<input type="email" id="email" name="email" />
						</div>
						<div class="form-group">
							<label for="password">Password</label>
							<input type="password" id="password" name="password" required />
						</div>
						<div id="errorMessage" class="error-message" role="alert"></div>
						<div id="successMessage" class="success-message" role="alert"></div>
						<button type="submit" id="submitButton">Login</button>
					</form>
				</div>
				<div class="card-footer">
					<label for="toggleMode" id="toggleLabel">Need an account?</label>
					<div class="toggle-switch">
						<input type="checkbox" id="toggleMode" />
						<label for="toggleMode" class="slider"></label>
					</div>
				</div>
			</div>
		</div>
		<script src="s.js"></script>
	</body>
</html>
